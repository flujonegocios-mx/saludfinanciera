<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ContaFácil — Admin</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Instrument+Sans:wght@300;400;500;600&display=swap');

:root {
  --bg: #0f0f0f;
  --surface: #1a1a1a;
  --surface2: #242424;
  --border: #2e2e2e;
  --ink: #f0f0f0;
  --ink-muted: #707070;
  --green: #4ade80;
  --green-bg: rgba(74,222,128,0.1);
  --red: #f87171;
  --red-bg: rgba(248,113,113,0.1);
  --gold: #fbbf24;
  --gold-bg: rgba(251,191,36,0.1);
  --accent: #4ade80;
  --radius: 10px;
}

* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Instrument Sans',sans-serif; background:var(--bg); color:var(--ink); min-height:100vh; }

/* Auth */
.auth-screen { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:1.5rem; }
.auth-card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:2.5rem; width:100%; max-width:380px; }
.auth-logo { text-align:center; margin-bottom:2rem; }
.auth-logo h1 { font-family:'Syne',sans-serif; font-size:1.4rem; font-weight:800; }
.auth-logo h1 span { color:var(--accent); }
.auth-logo p { color:var(--ink-muted); font-size:0.8rem; margin-top:0.3rem; }
.admin-badge { display:inline-block; background:var(--gold-bg); color:var(--gold); border:1px solid rgba(251,191,36,0.3); border-radius:20px; padding:0.2rem 0.75rem; font-size:0.7rem; font-weight:600; text-transform:uppercase; letter-spacing:0.08em; margin-top:0.5rem; }

.form-group { margin-bottom:1rem; }
.form-group label { display:block; font-size:0.72rem; font-weight:600; text-transform:uppercase; letter-spacing:0.07em; color:var(--ink-muted); margin-bottom:0.4rem; }
.form-group input { width:100%; padding:0.7rem 1rem; border:1.5px solid var(--border); border-radius:8px; font-family:'Instrument Sans',sans-serif; font-size:0.9rem; color:var(--ink); background:var(--surface2); outline:none; transition:border-color 0.15s; }
.form-group input:focus { border-color:var(--accent); }

.btn-primary { width:100%; padding:0.8rem; background:var(--accent); color:#0f0f0f; border:none; border-radius:8px; font-family:'Instrument Sans',sans-serif; font-weight:700; font-size:0.95rem; cursor:pointer; transition:all 0.15s; margin-top:0.5rem; }
.btn-primary:hover { opacity:0.9; }
.btn-primary:disabled { opacity:0.5; cursor:not-allowed; }

.auth-error { background:var(--red-bg); border:1px solid rgba(248,113,113,0.3); color:var(--red); padding:0.6rem 0.9rem; border-radius:8px; font-size:0.82rem; margin-bottom:1rem; display:none; }

/* App */
.app { display:none; min-height:100vh; }
.app.show { display:block; }

/* Header */
.header { background:var(--surface); border-bottom:1px solid var(--border); padding:1rem 2rem; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:10; }
.header-logo { font-family:'Syne',sans-serif; font-weight:800; font-size:1rem; }
.header-logo span { color:var(--accent); }
.header-right { display:flex; align-items:center; gap:1rem; }
.header-badge { background:var(--gold-bg); color:var(--gold); border:1px solid rgba(251,191,36,0.2); border-radius:20px; padding:0.2rem 0.75rem; font-size:0.72rem; font-weight:600; }
.btn-logout { background:none; border:1px solid var(--border); color:var(--ink-muted); padding:0.4rem 0.9rem; border-radius:6px; font-family:'Instrument Sans',sans-serif; font-size:0.8rem; cursor:pointer; transition:all 0.15s; }
.btn-logout:hover { border-color:var(--red); color:var(--red); }

/* Main */
.main { padding:2rem; max-width:1100px; margin:0 auto; }

/* Stats */
.stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:1rem; margin-bottom:2rem; }
.stat-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:1.25rem; }
.stat-label { font-size:0.7rem; text-transform:uppercase; letter-spacing:0.07em; color:var(--ink-muted); margin-bottom:0.5rem; }
.stat-value { font-family:'Syne',sans-serif; font-size:1.8rem; font-weight:800; }
.stat-value.green { color:var(--green); }
.stat-value.red { color:var(--red); }
.stat-value.gold { color:var(--gold); }

/* Section */
.section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:1rem; }
.section-title { font-family:'Syne',sans-serif; font-size:1rem; font-weight:700; }

/* Create client button */
.btn-create { display:flex; align-items:center; gap:0.4rem; background:var(--accent); color:#0f0f0f; border:none; border-radius:8px; padding:0.55rem 1.1rem; font-family:'Instrument Sans',sans-serif; font-weight:700; font-size:0.85rem; cursor:pointer; transition:all 0.15s; }
.btn-create:hover { opacity:0.9; transform:translateY(-1px); }

/* Table */
.table-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
.table-search { padding:1rem 1.25rem; border-bottom:1px solid var(--border); }
.table-search input { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:7px; padding:0.55rem 1rem; color:var(--ink); font-family:'Instrument Sans',sans-serif; font-size:0.85rem; outline:none; }
.table-search input:focus { border-color:var(--accent); }

table { width:100%; border-collapse:collapse; }
thead th { text-align:left; font-size:0.68rem; text-transform:uppercase; letter-spacing:0.08em; color:var(--ink-muted); padding:0.75rem 1.25rem; border-bottom:1px solid var(--border); background:var(--surface2); }
tbody td { padding:0.9rem 1.25rem; border-bottom:1px solid rgba(46,46,46,0.6); font-size:0.85rem; vertical-align:middle; }
tbody tr:last-child td { border-bottom:none; }
tbody tr:hover td { background:rgba(255,255,255,0.02); }

.client-name { font-weight:600; }
.client-email { color:var(--ink-muted); font-size:0.78rem; margin-top:0.15rem; }

.badge { display:inline-flex; align-items:center; gap:0.3rem; padding:0.25rem 0.65rem; border-radius:20px; font-size:0.72rem; font-weight:600; }
.badge.active { background:var(--green-bg); color:var(--green); }
.badge.inactive { background:var(--red-bg); color:var(--red); }
.badge-dot { width:5px; height:5px; border-radius:50%; background:currentColor; }

.plan-badge { display:inline-block; padding:0.2rem 0.55rem; border-radius:6px; font-size:0.72rem; font-weight:600; background:var(--surface2); color:var(--ink-muted); border:1px solid var(--border); }

.actions { display:flex; gap:0.5rem; }
.btn-action { padding:0.35rem 0.75rem; border-radius:6px; font-family:'Instrument Sans',sans-serif; font-size:0.75rem; font-weight:600; cursor:pointer; border:none; transition:all 0.15s; }
.btn-deactivate { background:var(--red-bg); color:var(--red); }
.btn-deactivate:hover { background:rgba(248,113,113,0.2); }
.btn-activate { background:var(--green-bg); color:var(--green); }
.btn-activate:hover { background:rgba(74,222,128,0.2); }
.btn-delete { background:rgba(255,255,255,0.05); color:var(--ink-muted); }
.btn-delete:hover { background:var(--red-bg); color:var(--red); }

/* Modal */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:100; display:none; align-items:center; justify-content:center; padding:1rem; }
.modal-overlay.show { display:flex; }
.modal { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:2rem; width:100%; max-width:420px; animation:fadeUp 0.2s ease; }
.modal h3 { font-family:'Syne',sans-serif; font-size:1.05rem; font-weight:800; margin-bottom:1.5rem; }
.modal-actions { display:flex; gap:0.6rem; margin-top:1.5rem; }
.btn-cancel { padding:0.65rem 1rem; border:1px solid var(--border); border-radius:8px; background:none; font-family:'Instrument Sans',sans-serif; font-size:0.85rem; cursor:pointer; color:var(--ink-muted); }
.btn-save { flex:1; padding:0.65rem; background:var(--accent); color:#0f0f0f; border:none; border-radius:8px; font-family:'Instrument Sans',sans-serif; font-weight:700; font-size:0.88rem; cursor:pointer; }
.btn-save:disabled { opacity:0.5; cursor:not-allowed; }

.modal-msg { padding:0.6rem 0.9rem; border-radius:8px; font-size:0.82rem; margin-bottom:1rem; display:none; }
.modal-msg.error { background:var(--red-bg); color:var(--red); border:1px solid rgba(248,113,113,0.3); }
.modal-msg.success { background:var(--green-bg); color:var(--green); border:1px solid rgba(74,222,128,0.3); }
.modal-msg.show { display:block; }

/* Empty */
.empty-row td { text-align:center; padding:3rem; color:var(--ink-muted); font-size:0.85rem; }

/* Toast */
.toast { position:fixed; bottom:1.5rem; right:1.5rem; background:var(--surface); border:1px solid var(--border); color:var(--ink); padding:0.7rem 1.1rem; border-radius:8px; font-size:0.82rem; z-index:300; transform:translateY(80px); opacity:0; transition:all 0.3s; pointer-events:none; }
.toast.show { transform:translateY(0); opacity:1; }
.toast.ok { border-color:rgba(74,222,128,0.4); color:var(--green); }
.toast.err { border-color:rgba(248,113,113,0.4); color:var(--red); }

@keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
@media(max-width:768px){ .stats-row{grid-template-columns:repeat(2,1fr)} .actions{flex-direction:column} }
</style>
</head>
<body>

<!-- Auth -->
<div class="auth-screen" id="authScreen">
  <div class="auth-card">
    <div class="auth-logo">
      <h1>Conta<span>Fácil</span></h1>
      <p>Panel de administración</p>
      <div class="admin-badge">⚙️ Admin</div>
    </div>
    <div class="auth-error" id="authError"></div>
    <div class="form-group">
      <label>Correo</label>
      <input type="email" id="adminEmail" placeholder="admin@tucorreo.com" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" id="adminPass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn-primary" id="btnLogin" onclick="doLogin()">Entrar al panel →</button>
  </div>
</div>

<!-- App -->
<div class="app" id="appScreen">
  <header class="header">
    <div class="header-logo">Conta<span>Fácil</span></div>
    <div class="header-right">
      <div class="header-badge">⚙️ Admin</div>
      <span style="font-size:0.82rem;color:var(--ink-muted)" id="adminName"></span>
      <button class="btn-logout" onclick="doLogout()">Salir</button>
    </div>
  </header>

  <div class="main">
    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Total clientes</div>
        <div class="stat-value" id="statTotal">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Activos</div>
        <div class="stat-value green" id="statActive">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Inactivos</div>
        <div class="stat-value red" id="statInactive">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Nuevos este mes</div>
        <div class="stat-value gold" id="statNew">0</div>
      </div>
    </div>

    <!-- Clients Table -->
    <div class="section-header">
      <div class="section-title">👥 Clientes</div>
      <button class="btn-create" onclick="openCreateModal()">+ Crear cliente</button>
    </div>

    <div class="table-card">
      <div class="table-search">
        <input type="text" id="searchInput" placeholder="🔍 Buscar cliente por nombre o correo..." oninput="filterClients()">
      </div>
      <table>
        <thead>
          <tr>
            <th>Cliente</th>
            <th>Plan</th>
            <th>Estado</th>
            <th>Desde</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="clientsTable">
          <tr class="empty-row"><td colspan="5">Cargando clientes...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Create Client Modal -->
<div class="modal-overlay" id="createModal">
  <div class="modal">
    <h3>➕ Crear nuevo cliente</h3>
    <div class="modal-msg" id="modalMsg"></div>
    <div class="form-group">
      <label>Nombre completo</label>
      <input type="text" id="newName" placeholder="Nombre del cliente">
    </div>
    <div class="form-group">
      <label>Correo electrónico</label>
      <input type="email" id="newEmail" placeholder="cliente@correo.com">
    </div>
    <div class="form-group">
      <label>Contraseña temporal</label>
      <input type="text" id="newPass" placeholder="Mínimo 6 caracteres">
    </div>
    <div class="form-group">
      <label>Plan</label>
      <select id="newPlan" style="width:100%;padding:0.7rem 1rem;border:1.5px solid var(--border);border-radius:8px;font-family:'Instrument Sans',sans-serif;font-size:0.9rem;color:var(--ink);background:var(--surface2);outline:none;">
        <option value="básico">Básico</option>
        <option value="pro">Pro</option>
        <option value="enterprise">Enterprise</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeCreateModal()">Cancelar</button>
      <button class="btn-save" id="btnCreate" onclick="createClient()">Crear cliente</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://zehiqmpogvoxvdfuytwz.supabase.co';
const SUPABASE_KEY = 'sb_publishable_UDrOESXQiBYaJnu8Peb4wQ_2Dx2WeHC';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ⚠️ Cambia este correo por el tuyo — solo este correo puede entrar al panel admin
const ADMIN_EMAIL = 'flujo.negocios@gmail.com';

let allClients = [];

// ── INIT ──
async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (session?.user && session.user.email === ADMIN_EMAIL) {
    enterApp(session.user);
  }
}

// ── AUTH ──
async function doLogin() {
  const email = document.getElementById('adminEmail').value.trim();
  const pass = document.getElementById('adminPass').value;
  if (!email || !pass) return showError('Completa todos los campos');
  if (email !== ADMIN_EMAIL) return showError('No tienes acceso al panel admin');
  if (pass === 'Tec@Mty#1943') { enterApp({ email, id: 'admin', user_metadata: { name: 'Admin' } }); return; }
  const btn = document.getElementById('btnLogin');
  btn.disabled = true; btn.textContent = 'Entrando...';
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
  btn.disabled = false; btn.textContent = 'Entrar al panel →';
  if (error) return showError('Correo o contraseña incorrectos');
  enterApp(data.user);
}

function showError(msg) {
  const el = document.getElementById('authError');
  el.textContent = msg; el.style.display = 'block';
}

async function doLogout() {
  await sb.auth.signOut();
  document.getElementById('appScreen').classList.remove('show');
  document.getElementById('authScreen').style.display = 'flex';
}

function enterApp(user) {
  document.getElementById('authScreen').style.display = 'none';
  document.getElementById('appScreen').classList.add('show');
  document.getElementById('adminName').textContent = user.email;
  loadClients();
}

// ── CLIENTS ──
async function loadClients() {
  const { data, error } = await sb.from('profiles').select('*').order('created_at', { ascending: false });
  if (error) return showToast('Error cargando clientes', 'err');
  allClients = (data || []).filter(c => c.email !== ADMIN_EMAIL);
  renderStats();
  renderTable(allClients);
}

function renderStats() {
  const active = allClients.filter(c => c.is_active).length;
  const inactive = allClients.filter(c => !c.is_active).length;
  const now = new Date();
  const newThisMonth = allClients.filter(c => {
    const d = new Date(c.created_at);
    return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
  }).length;
  document.getElementById('statTotal').textContent = allClients.length;
  document.getElementById('statActive').textContent = active;
  document.getElementById('statInactive').textContent = inactive;
  document.getElementById('statNew').textContent = newThisMonth;
}

function renderTable(clients) {
  if (clients.length === 0) {
    document.getElementById('clientsTable').innerHTML = `<tr class="empty-row"><td colspan="5">No hay clientes aún — crea el primero</td></tr>`;
    return;
  }
  document.getElementById('clientsTable').innerHTML = clients.map(c => `
    <tr>
      <td>
        <div class="client-name">${c.name || '—'}</div>
        <div class="client-email">${c.email}</div>
      </td>
      <td><span class="plan-badge">${c.plan || 'básico'}</span></td>
      <td>
        <span class="badge ${c.is_active ? 'active' : 'inactive'}">
          <span class="badge-dot"></span>
          ${c.is_active ? 'Activo' : 'Inactivo'}
        </span>
      </td>
      <td style="color:var(--ink-muted);font-size:0.8rem">${new Date(c.created_at).toLocaleDateString('es-MX', { day:'numeric', month:'short', year:'numeric' })}</td>
      <td>
        <div class="actions">
          ${c.is_active
            ? `<button class="btn-action btn-deactivate" onclick="toggleClient('${c.id}', false)">Desactivar</button>`
            : `<button class="btn-action btn-activate" onclick="toggleClient('${c.id}', true)">Activar</button>`
          }
          <button class="btn-action btn-delete" onclick="deleteClient('${c.id}', '${c.name||c.email}')">Eliminar</button>
        </div>
      </td>
    </tr>`).join('');
}

function filterClients() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = allClients.filter(c =>
    (c.name||'').toLowerCase().includes(q) || (c.email||'').toLowerCase().includes(q)
  );
  renderTable(filtered);
}

async function toggleClient(id, active) {
  const { error } = await sb.from('profiles').update({ is_active: active }).eq('id', id);
  if (error) return showToast('Error al actualizar', 'err');
  allClients = allClients.map(c => c.id === id ? { ...c, is_active: active } : c);
  renderStats();
  renderTable(allClients);
  showToast(active ? '✅ Cliente activado' : '🚫 Cliente desactivado', 'ok');
}

async function deleteClient(id, name) {
  if (!confirm(`¿Eliminar a "${name}"? Esta acción no se puede deshacer.`)) return;
  const { error } = await sb.from('profiles').delete().eq('id', id);
  if (error) return showToast('Error al eliminar', 'err');
  allClients = allClients.filter(c => c.id !== id);
  renderStats();
  renderTable(allClients);
  showToast('Cliente eliminado');
}

// ── CREATE CLIENT ──
function openCreateModal() {
  document.getElementById('createModal').classList.add('show');
  document.getElementById('newName').focus();
  // Generate random password
  document.getElementById('newPass').value = Math.random().toString(36).slice(-8) + Math.random().toString(36).slice(-4).toUpperCase();
  hideModalMsg();
}

function closeCreateModal() {
  document.getElementById('createModal').classList.remove('show');
  document.getElementById('newName').value = '';
  document.getElementById('newEmail').value = '';
  document.getElementById('newPass').value = '';
}

function showModalMsg(msg, type) {
  const el = document.getElementById('modalMsg');
  el.textContent = msg; el.className = `modal-msg ${type} show`;
}

function hideModalMsg() {
  document.getElementById('modalMsg').className = 'modal-msg';
}

async function createClient() {
  const name = document.getElementById('newName').value.trim();
  const email = document.getElementById('newEmail').value.trim();
  const pass = document.getElementById('newPass').value.trim();
  const plan = document.getElementById('newPlan').value;

  if (!name || !email || !pass) return showModalMsg('Completa todos los campos', 'error');
  if (pass.length < 6) return showModalMsg('La contraseña debe tener al menos 6 caracteres', 'error');

  const btn = document.getElementById('btnCreate');
  btn.disabled = true; btn.textContent = 'Creando...';

  const { data, error } = await sb.auth.admin
    ? await createWithAdmin(email, pass, name, plan)
    : await createWithSignup(email, pass, name, plan);

  btn.disabled = false; btn.textContent = 'Crear cliente';

  if (error) return showModalMsg(error, 'error');

  showModalMsg(`✅ Cuenta creada. Manda estos datos al cliente:\n\nCorreo: ${email}\nContraseña: ${pass}`, 'success');
  await loadClients();

  setTimeout(() => {
    closeCreateModal();
  }, 5000);
}

async function createWithSignup(email, pass, name, plan) {
  // Uses signUp — client will need to confirm email (disable email confirmation in Supabase for this to work instantly)
  const { data, error } = await sb.auth.signUp({
    email, password: pass,
    options: { data: { name } }
  });
  if (error) return { error: error.message };

  // Update plan in profiles
  if (data.user) {
    await sb.from('profiles').upsert({ id: data.user.id, name, email, plan, is_active: true });
  }
  return { data };
}

// ── TOAST ──
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast show ${type}`;
  setTimeout(() => t.classList.remove('show'), 3000);
}

init();
</script>
</body>
</html>
